spring.application.name=child-safety-service
server.port=8082

# ── Multipart (existing - for video upload via REST) ──────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB

# ── Python YOLO violence detection service ────────────────────────────────────
detection.python-service.url=${PYTHON_SERVICE_URL:http://localhost:5005}

# ── GuardianAI Database microservice ─────────────────────────────────────────
detection.db-service.url=${DB_SERVICE_URL:http://localhost:8081}

# ── WebClient buffer (frames can be a few MB) ─────────────────────────────────
spring.codec.max-in-memory-size=10MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example.child_safety_service=INFO
